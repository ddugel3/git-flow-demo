name: Fix request
description: 수정 작업 요청 템플릿
title: "[Fix] "
labels: ["fix"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 수정 대상/문제 설명
      placeholder: 어떤 부분을 수정해야 하는지 간단히 작성
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 현재 동작/재현 방법
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
