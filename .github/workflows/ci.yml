name: CI

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate text
        run: |
          if grep -R "ERROR_TOKEN" . --exclude-dir=.git --exclude-dir=.github; then
            echo "Found forbidden text: ERROR_TOKEN"
            exit 1
          fi
          echo "CI passed"
